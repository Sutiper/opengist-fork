{{ template "header" .}}
<div class="py-10 max-w-2xl mx-auto">
    <header>
        <h1 class="text-2xl font-bold leading-tight text-slate-700 dark:text-slate-300">
            {{ .locale.Tr "gist.anon.delete-confirm" }}
        </h1>
    </header>
    <main class="mt-6 space-y-6">

        <div class="rounded-md bg-red-50 dark:bg-red-900/20 p-4 border border-red-200 dark:border-red-700">
            <div class="flex">
                <div class="flex-shrink-0">
                    <svg class="h-5 w-5 text-red-400" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
                    </svg>
                </div>
                <div class="ml-3">
                    <h3 class="text-sm font-semibold text-red-800 dark:text-red-200">
                        {{ .locale.Tr "gist.anon.delete-warning" }}
                    </h3>
                    <p class="mt-1 text-sm text-red-700 dark:text-red-300">
                        {{ .locale.Tr "gist.anon.delete-irreversible" }} <strong>{{ .gist.Title }}</strong>
                    </p>
                </div>
            </div>
        </div>

        <div class="flex gap-3">
            <form method="post" action="{{ $.c.ExternalUrl }}/anon/delete/{{ .token }}">
                {{ .csrfHtml }}
                <button type="submit"
                    class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500">
                    {{ .locale.Tr "gist.anon.delete-confirm-button" }}
                </button>
            </form>
            <a href="{{ $.c.ExternalUrl }}/anon/edit/{{ .token }}"
               class="inline-flex items-center px-4 py-2 border border-gray-300 dark:border-gray-600 text-sm font-medium rounded-md text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700">
                {{ .locale.Tr "gist.anon.cancel" }}
            </a>
        </div>

    </main>
</div>
{{ template "footer" .}}
