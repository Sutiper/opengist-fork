name: Sync upstream

on:
  schedule:
    - cron: '0 6 * * 1'  # Tous les lundis à 6h
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/thomiceli/opengist.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Check if upstream has new commits
        id: check
        run: |
          BEHIND=$(git rev-list HEAD..upstream/master --count)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          echo "Upstream is $BEHIND commits ahead of our fork"

      - name: Create sync branch and merge
        if: steps.check.outputs.behind != '0'
        id: merge
        run: |
          BRANCH="sync/upstream-$(date +%Y%m%d)"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          git checkout -b "$BRANCH"
          if git merge upstream/master --no-edit; then
            echo "conflicts=false" >> $GITHUB_OUTPUT
          else
            echo "conflicts=true" >> $GITHUB_OUTPUT
            git add -A
            git commit -m "chore: sync upstream (with conflicts to resolve)"
          fi
          git push origin "$BRANCH"

      - name: Create Pull Request
        if: steps.check.outputs.behind != '0'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: ${{ steps.merge.outputs.branch }}
          title: "chore: sync upstream opengist $(date +%Y-%m-%d)"
          body: |
            Synchronisation automatique depuis [thomiceli/opengist](https://github.com/thomiceli/opengist).

            **Commits en avance upstream :** ${{ steps.check.outputs.behind }}

            ⚠️ Vérifie les conflits sur ces fichiers avant de merger :
            - `internal/db/gist.go`
            - `internal/web/server/router.go`
            - `internal/web/server/middlewares.go`
          labels: upstream-sync
          draft: ${{ steps.merge.outputs.conflicts == 'true' }}

      - name: No update needed
        if: steps.check.outputs.behind == '0'
        run: echo "Fork is up to date with upstream."
