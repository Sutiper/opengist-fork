name: Sync upstream

on:
  schedule:
    - cron: '0 6 * * 1'  # Tous les lundis à 6h
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      workflows: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/thomiceli/opengist.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Check if upstream has new commits
        id: check
        run: |
          UPSTREAM_SHA=$(git rev-parse upstream/master)
          LAST_SYNC=$(cat .last-upstream-sync 2>/dev/null || echo "")
          if [ "$UPSTREAM_SHA" = "$LAST_SYNC" ]; then
            echo "behind=0" >> $GITHUB_OUTPUT
            echo "upstream_sha=" >> $GITHUB_OUTPUT
          else
            if [ -z "$LAST_SYNC" ]; then
              BEHIND=$(git rev-list upstream/master --count)
            else
              BEHIND=$(git rev-list ${LAST_SYNC}..upstream/master --count 2>/dev/null || git rev-list upstream/master --count)
            fi
            echo "behind=$BEHIND" >> $GITHUB_OUTPUT
            echo "upstream_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT
            echo "Upstream has $BEHIND new commits since last sync"
          fi

      - name: Create sync branch and merge
        if: steps.check.outputs.behind != '0'
        id: merge
        run: |
          BRANCH="sync/upstream-$(date +%Y%m%d)"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          git checkout -b "$BRANCH"

          # Merge upstream (unrelated histories)
          git merge upstream/master --no-edit --allow-unrelated-histories || true

          # Toujours restaurer NOS fichiers après le merge
          # pour éviter les conflits de workflows et garder notre config
          git checkout HEAD~0 2>/dev/null || true

          # Restaurer nos workflows (évite le problème de permission)
          git checkout main -- .github/workflows/ 2>/dev/null || true

          # Supprimer les dossiers upstream qu'on n'utilise pas
          rm -rf docs/ helm/ scripts/ 2>/dev/null || true

          # Commit final avec tous les changements
          git add -A
          if git diff --cached --quiet; then
            echo "conflicts=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: sync upstream (restore our workflows and remove unused dirs)"
            echo "conflicts=false" >> $GITHUB_OUTPUT
          fi

          # Enregistrer le SHA synced
          echo "${{ steps.check.outputs.upstream_sha }}" > .last-upstream-sync
          git add .last-upstream-sync
          git commit -m "chore: record upstream sync SHA" || true

          git push origin "$BRANCH"

      - name: Create Pull Request
        if: steps.check.outputs.behind != '0'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: ${{ steps.merge.outputs.branch }}
          title: "chore: sync upstream opengist (${{ steps.check.outputs.behind }} commits)"
          body: |
            Synchronisation automatique depuis [thomiceli/opengist](https://github.com/thomiceli/opengist).

            **Nouveaux commits upstream :** ${{ steps.check.outputs.behind }}

            ✅ Nos workflows `.github/workflows/` sont préservés automatiquement.
            🗑️ Les dossiers `docs/`, `helm/`, `scripts/` sont retirés automatiquement.

            ⚠️ Vérifie manuellement ces fichiers avant de merger :
            - `internal/db/gist.go`
            - `internal/web/server/router.go`
            - `internal/web/server/middlewares.go`
            - `internal/web/handlers/gist/create.go`
            - `internal/web/handlers/gist/anonymous.go`
          labels: upstream-sync
          draft: ${{ steps.merge.outputs.conflicts == 'true' }}

      - name: No update needed
        if: steps.check.outputs.behind == '0'
        run: echo "Fork is already up to date with upstream."
